kind = "web"
previewPath = "/"
title = "TraderLoading"
version = "1.0.0"
id = "artifacts/trader-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19111
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/trader-dashboard run dev"

[services.env]
PORT = "19111"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/trader-dashboard", "run", "build"]
publicDir = "artifacts/trader-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
