packages:
  "framer-motion": "For page transitions, modal animations, and smooth UI interactions"
  "date-fns": "For elegant date and time formatting"
  "date-fns-tz": "For robust UTC timezone handling and calculations"
  "lucide-react": "Beautiful, consistent iconography"
  "canvas-confetti": "To celebrate user level-ups with a confetti explosion"
  "@types/canvas-confetti": "Types for canvas-confetti"
  "clsx": "For conditional class name joining"
  "tailwind-merge": "For intelligently merging Tailwind utility classes"

images:
  - path: "artifacts/trader-dashboard/public/images/dashboard-bg.png"
    description: "Abstract dark financial chart background with subtle green and teal neon glowing lines, dark mode, minimalist noise texture"
    aspect_ratio: "16:9"
  - path: "artifacts/trader-dashboard/public/images/avatar-default.png"
    description: "A sleek, minimalist cyberpunk default user avatar geometric shape in neon green and dark grey, no face, abstract"
    aspect_ratio: "1:1"

notes:
  - "Assuming React Query setup allows direct usage of @workspace/api-client-react hooks."
  - "Using CSS variables for consistent dark mode theming."
