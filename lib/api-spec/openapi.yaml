openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TraderLoading API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: profile
    description: User profile operations
  - name: missions
    description: Daily missions operations
  - name: journal
    description: Trading journal operations
  - name: ideas
    description: Ideas and goals
  - name: checklist
    description: Checklist operations
  - name: news
    description: Macro news
  - name: settings
    description: User settings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect after login.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /profile/check-name:
    get:
      operationId: checkProfileName
      tags: [profile]
      summary: Check if a profile name is available
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Name availability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckNameResponse"

  /profile/avatar:
    post:
      operationId: uploadProfileAvatar
      tags: [profile]
      summary: Upload a profile avatar image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
              required:
                - image
      responses:
        "200":
          description: Uploaded avatar URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarResponse"

  /profile/avatar/generate:
    post:
      operationId: generateProfileAvatar
      tags: [profile]
      summary: Generate a unique AI avatar
      responses:
        "200":
          description: Generated avatar URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarResponse"
        "500":
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /missions:
    get:
      operationId: getMissions
      tags: [missions]
      summary: Get daily missions
      responses:
        "200":
          description: List of missions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Mission"

  /missions/{id}/complete:
    post:
      operationId: completeMission
      tags: [missions]
      summary: Mark a mission as complete
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated mission and profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteMissionResponse"

  /journal:
    get:
      operationId: getJournalEntries
      tags: [journal]
      summary: Get all journal entries
      responses:
        "200":
          description: List of journal entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JournalEntry"
    post:
      operationId: createJournalEntry
      tags: [journal]
      summary: Create a new journal entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJournalEntryRequest"
      responses:
        "201":
          description: Created journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"

  /journal/{id}:
    get:
      operationId: getJournalEntry
      tags: [journal]
      summary: Get a single journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
    put:
      operationId: updateJournalEntry
      tags: [journal]
      summary: Update a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJournalEntryRequest"
      responses:
        "200":
          description: Updated journal entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalEntry"
    delete:
      operationId: deleteJournalEntry
      tags: [journal]
      summary: Delete a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /journal/{id}/images:
    post:
      operationId: uploadJournalImage
      tags: [journal]
      summary: Upload an image for a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
              required:
                - image
      responses:
        "200":
          description: Uploaded image URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadImageResponse"

  /journal/{id}/images/{imageId}:
    delete:
      operationId: deleteJournalImage
      tags: [journal]
      summary: Remove an image from a journal entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /ideas:
    get:
      operationId: getIdeas
      tags: [ideas]
      summary: Get ideas and goals
      responses:
        "200":
          description: List of ideas and goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Idea"
    post:
      operationId: createIdea
      tags: [ideas]
      summary: Create an idea or goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIdeaRequest"
      responses:
        "201":
          description: Created idea/goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"

  /ideas/{id}:
    put:
      operationId: updateIdea
      tags: [ideas]
      summary: Update an idea or goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIdeaRequest"
      responses:
        "200":
          description: Updated idea/goal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"
    delete:
      operationId: deleteIdea
      tags: [ideas]
      summary: Delete an idea or goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /checklist:
    get:
      operationId: getChecklist
      tags: [checklist]
      summary: Get all checklist items for today
      responses:
        "200":
          description: Checklist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChecklistItem"
    post:
      operationId: createChecklistItem
      tags: [checklist]
      summary: Create a checklist item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChecklistItemRequest"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistItem"

  /checklist/{id}:
    put:
      operationId: updateChecklistItem
      tags: [checklist]
      summary: Update a checklist item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChecklistItemRequest"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChecklistItem"
    delete:
      operationId: deleteChecklistItem
      tags: [checklist]
      summary: Delete a checklist item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /news:
    get:
      operationId: getMacroNews
      tags: [news]
      summary: Get macro economic news affecting gold/dollar
      responses:
        "200":
          description: News list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsResponse"

  /settings:
    get:
      operationId: getUserSettings
      tags: [settings]
      summary: Get user settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"
    put:
      operationId: updateUserSettings
      tags: [settings]
      summary: Update user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserSettingsRequest"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSettings"

  /settings/background:
    post:
      operationId: uploadBackground
      tags: [settings]
      summary: Upload a custom background image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
              required:
                - image
      responses:
        "200":
          description: Uploaded background
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadBackgroundResponse"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        xp:
          type: integer
        level:
          type: integer
        xpToNextLevel:
          type: integer
      required:
        - id
        - name
        - xp
        - level
        - xpToNextLevel

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
      required:
        - name

    CheckNameResponse:
      type: object
      properties:
        available:
          type: boolean
      required:
        - available

    AvatarResponse:
      type: object
      properties:
        avatarUrl:
          type: string
      required:
        - avatarUrl

    Mission:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        xpReward:
          type: integer
        completed:
          type: boolean
        completedAt:
          type: string
          nullable: true
      required:
        - id
        - title
        - description
        - xpReward
        - completed

    CompleteMissionResponse:
      type: object
      properties:
        mission:
          $ref: "#/components/schemas/Mission"
        profile:
          $ref: "#/components/schemas/UserProfile"
        levelUp:
          type: boolean
      required:
        - mission
        - profile
        - levelUp

    JournalImage:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
      required:
        - id
        - url

    JournalEntry:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        tradeDate:
          type: string
        result:
          type: string
          enum: [win, loss, breakeven, none]
        tags:
          type: string
          nullable: true
        images:
          type: array
          items:
            $ref: "#/components/schemas/JournalImage"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - content
        - tradeDate
        - result
        - images
        - createdAt
        - updatedAt

    CreateJournalEntryRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        tradeDate:
          type: string
        result:
          type: string
          enum: [win, loss, breakeven, none]
        tags:
          type: string
          nullable: true
      required:
        - title
        - content
        - tradeDate
        - result

    UpdateJournalEntryRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        tradeDate:
          type: string
        result:
          type: string
          enum: [win, loss, breakeven, none]
        tags:
          type: string
          nullable: true
      required:
        - title
        - content
        - tradeDate
        - result

    DeleteResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    UploadImageResponse:
      type: object
      properties:
        image:
          $ref: "#/components/schemas/JournalImage"
      required:
        - image

    Idea:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [idea, goal]
        content:
          type: string
        completed:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - type
        - content
        - completed
        - createdAt

    CreateIdeaRequest:
      type: object
      properties:
        type:
          type: string
          enum: [idea, goal]
        content:
          type: string
      required:
        - type
        - content

    UpdateIdeaRequest:
      type: object
      properties:
        content:
          type: string
        completed:
          type: boolean
      required:
        - content
        - completed

    ChecklistItem:
      type: object
      properties:
        id:
          type: integer
        text:
          type: string
        completed:
          type: boolean
        order:
          type: integer
      required:
        - id
        - text
        - completed
        - order

    CreateChecklistItemRequest:
      type: object
      properties:
        text:
          type: string
      required:
        - text

    UpdateChecklistItemRequest:
      type: object
      properties:
        text:
          type: string
        completed:
          type: boolean
      required:
        - text
        - completed

    NewsArticle:
      type: object
      properties:
        title:
          type: string
        summary:
          type: string
        source:
          type: string
        publishedAt:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        sentiment:
          type: string
          enum: [bullish, bearish, neutral]
          nullable: true
      required:
        - title
        - summary
        - source

    NewsResponse:
      type: object
      properties:
        articles:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticle"
        fetchedAt:
          type: string
        hasApiKey:
          type: boolean
      required:
        - articles
        - fetchedAt
        - hasApiKey

    UserSettings:
      type: object
      properties:
        id:
          type: integer
        backgroundUrl:
          type: string
          nullable: true
        backgroundType:
          type: string
          enum: [default, custom]
        fontChoice:
          type: string
          enum: [inter, jetbrains, roboto, space-grotesk, ibm-plex]
        backgroundDarkness:
          type: integer
          minimum: 0
          maximum: 90
      required:
        - id
        - backgroundType
        - fontChoice
        - backgroundDarkness

    UpdateUserSettingsRequest:
      type: object
      properties:
        backgroundUrl:
          type: string
          nullable: true
        backgroundType:
          type: string
          enum: [default, custom]
        fontChoice:
          type: string
          enum: [inter, jetbrains, roboto, space-grotesk, ibm-plex]
        backgroundDarkness:
          type: integer
          minimum: 0
          maximum: 90

    UploadBackgroundResponse:
      type: object
      properties:
        url:
          type: string
      required:
        - url
